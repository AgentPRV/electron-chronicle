<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

  <!-- Insert this line above script imports  -->
<script>
if (typeof module === 'object') {window.module = module; module = undefined;}
</script>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
  <script type="text/javascript" src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
  <!-- Insert this line after script imports -->
<script>if (window.module) module = window.module;</script>
  <script src="./db.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    .act-btns {
        float: right;
        margin-right: 5px;
        padding: auto;
    }
    .panel-heading {
        min-height: 50px;
    }
  </style>

</head>
<body>
<!-- Modal for edit and add note -->
<div id="noteModal" class="modal fade" role="dialog">
    <div class="modal-dialog">
  
      <!-- Modal content-->
      <div class="modal-content">
        <div class="modal-header">
          <button type="button" class="close" data-dismiss="modal">&times;</button>
          <h4 class="modal-title">Add / Edit Note</h4>
        </div>
        <div class="modal-body">
            <form action="">
                <div class="form-group">
                  <label for="title">Title</label>
                  <input type="text" class="form-control" placeholder="Enter title" id="title" name="title" required>
                </div>
                <div class="form-group">
                  <label for="description">Description</label>
                  <textarea class="form-control" placeholder="Enter description" name="description" id="description" required></textarea>
                </div>
                <input type="hidden" name="id" id="note_id">
                <button type="submit" class="btn btn-success" onclick="submitNote()">Submit</button>
              </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
        </div>
      </div>
  
    </div>
  </div>

<div class="container">
  <h2>Todo List</h2>
  <button type="button" class="btn btn-success" onclick="showModal()">+ Add Note</button><br><br>

  <div class="panel-group" id="accordion">
    <!--Data will be automatically appended here from database-->
  </div> 
</div>

<script>

  fetchNotesData()

  function showModal(id){
    if(id == null){
      $("#note_id").val("");
    }else{
      $("#note_id").val(id);
    }
    $("#title").val($("#title"+id).html());
    $("#description").val($("#description"+id).children().html());
    $('#noteModal').modal('show');

  }
  </script>
</body>
</html>
